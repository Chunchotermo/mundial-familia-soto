<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1730"/>
      <stop offset="100%" style="stop-color:#070d1c"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2d7e"/>
      <stop offset="55%" style="stop-color:#ff8a2b"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <rect x="3" y="3" width="186" height="186" rx="36" fill="none" stroke="url(#grad)" stroke-width="3" opacity="0.6"/>
  <!-- Balón -->
  <text x="96" y="72" font-size="40" text-anchor="middle">⚽</text>
  <!-- Barra -->
  <rect x="16" y="82" width="160" height="4" rx="2" fill="url(#grad)"/>
  <!-- Mundial -->
  <text x="96" y="108" font-family="Impact, Arial Narrow Bold, sans-serif" font-size="18" font-weight="900" text-anchor="middle" fill="#8ea0c8" letter-spacing="3">MUNDIAL</text>
  <!-- Familia -->
  <text x="96" y="133" font-family="Impact, Arial Narrow Bold, sans-serif" font-size="22" font-weight="900" text-anchor="middle" fill="url(#grad)" letter-spacing="1">FAMILIA</text>
  <!-- Soto -->
  <text x="96" y="158" font-family="Impact, Arial Narrow Bold, sans-serif" font-size="28" font-weight="900" text-anchor="middle" fill="url(#grad)" letter-spacing="4">SOTO</text>
  <!-- 2026 -->
  <text x="96" y="177" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#8ea0c8" letter-spacing="3">2026</text>
</svg>
