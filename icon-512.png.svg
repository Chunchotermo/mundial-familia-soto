<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1730"/>
      <stop offset="100%" style="stop-color:#070d1c"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2d7e"/>
      <stop offset="55%" style="stop-color:#ff8a2b"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#ff2d7e;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#070d1c;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect width="512" height="512" rx="100" fill="url(#glow)"/>
  <rect x="6" y="6" width="500" height="500" rx="96" fill="none" stroke="url(#grad)" stroke-width="5" opacity="0.5"/>
  <!-- Balón -->
  <text x="256" y="165" font-size="110" text-anchor="middle">⚽</text>
  <!-- Barra -->
  <rect x="40" y="182" width="432" height="8" rx="4" fill="url(#grad)"/>
  <!-- Mundial -->
  <text x="256" y="248" font-family="Impact, Arial Narrow Bold, sans-serif" font-size="46" font-weight="900" text-anchor="middle" fill="#8ea0c8" letter-spacing="10">MUNDIAL</text>
  <!-- Familia -->
  <text x="256" y="318" font-family="Impact, Arial Narrow Bold, sans-serif" font-size="62" font-weight="900" text-anchor="middle" fill="url(#grad)" letter-spacing="6">FAMILIA</text>
  <!-- Soto -->
  <text x="256" y="400" font-family="Impact, Arial Narrow Bold, sans-serif" font-size="82" font-weight="900" text-anchor="middle" fill="url(#grad)" letter-spacing="10">SOTO</text>
  <!-- 2026 -->
  <text x="256" y="450" font-family="Arial, sans-serif" font-size="28" font-weight="600" text-anchor="middle" fill="#8ea0c8" letter-spacing="8">2026</text>
</svg>
